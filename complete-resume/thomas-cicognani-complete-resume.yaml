  sections:
    Ingénieur full-stack:
      - En 13 ans d’expérience dans l’architecture logicielle et l’analyse de Systèmes d’Information de divers clients, j’ai acquis une forte exigence de qualité afin de livrer des produits les plus stables possibles.
      - J’aime aussi travailler en équipe, partager mes connaissances, monter en compétence et apprendre de nouvelles technologies via des formations au service du produit et des clients.
      - Je mets également en pratique ces connaissances dans le monde de l’Open Source.
      - Je porte aussi une très grande importance à des techniques comme le Domain-Driven Design, l’architecture hexagonale, la qualité et l’agilité qui apporte une certaine rigueur et un cadre sein dans une équipe afin de produire le plus efficacement et qualitativement possible.
      - J’apprécie également être au service des autres que ce soit professionnellement ou personnellement. Je suis dans le monde associatif depuis 2008 où j’ai notamment participé à une émission de radio et été rédacteur web. Enfin, j'ai également eu l'opportunité de m'engager pendant deux ans dans une association de secourisme (PSE2 en juin 2022) afin d’avoir un sentiment d’utilité envers la population.

